name: BuildAndDeploy 

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: dist/
          server-dir: ./
          dangerous-clean-slate: true

      - name: Cleanup old deployment history
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const env = "production";
            const keep = 5;

            // Get all deployments for the environment
            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              { owner, repo, environment: env, per_page: 100 }
            );

            if (deployments.length <= keep) {
              core.info("No old deployments to delete.");
            } else {
              const toDelete = deployments.slice(keep);

              for (const d of toDelete) {
                try {
                  // Mark as inactive
                  await github.rest.repos.createDeploymentStatus({
                    owner,
                    repo,
                    deployment_id: d.id,
                    state: "inactive"
                  });

                  deployment_id: d.id
                  // Delete deployment
                  await github.rest.repos.deleteDeployment({
                    owner,
                    repo,
                    deployment_id: d.id
                  });

                  core.info(`Deleted deployment ${d.id}`);
                } catch (e) {
                  core.warning(`Failed to delete deployment ${d.id}: ${e.message}`);
                }
              }
            }
